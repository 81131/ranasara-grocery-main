
services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: grocery_postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend API ─────────────────────────────────────────────────────────────
  # entrypoint.sh handles:
  #   • waiting for Postgres
  #   • running DB migrations (create_all)
  #   • auto-seeding + ML training if the DB is empty  ← zero manual steps
  #   • starting uvicorn with 4 workers
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grocery_fastapi_backend
    # No `command:` override — entrypoint.sh is the sole startup logic
    volumes:
      - ./backend:/app
      - ./pictures:/app/pictures
      - ./data:/data
      - ./model_accuracy:/model_accuracy
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grocery_react_frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  # ── Metabase (optional BI dashboard — access at localhost:4000) ────────────
  metabase:
    image: metabase/metabase:latest
    container_name: grocery_metabase
    restart: on-failure
    ports:
      - "4000:3000"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      - db
    env_file:
      - .env
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: db
      JAVA_OPTS: "-Xmx512m"

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  proxy:
    image: nginx:alpine
    container_name: grocery_nginx_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  metabase_data: